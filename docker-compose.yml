services:
  kagi-ken-mcp:
    build:
      context: .
      args:
        KAGI_KEN_MCP_REF: ${KAGI_KEN_MCP_REF:-1.3.0}
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-bab3l}/kagi-ken-mcp:local
    container_name: kagi-ken-mcp
    environment:
      KAGI_SESSION_TOKEN: ${KAGI_SESSION_TOKEN}
      KAGI_SUMMARIZER_ENGINE: ${KAGI_SUMMARIZER_ENGINE:-default}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamableHttp}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_STREAMABLE_HTTP_PATH: ${MCP_STREAMABLE_HTTP_PATH:-/mcp}
      MCP_SSE_PATH: ${MCP_SSE_PATH:-/sse}
      MCP_MESSAGE_PATH: ${MCP_MESSAGE_PATH:-/message}
      MCP_HA_COMPAT: ${MCP_HA_COMPAT:-false}
      MCP_HA_STRIP_SCHEMA_KEYWORDS: ${MCP_HA_STRIP_SCHEMA_KEYWORDS:-minItems}
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-info}
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
